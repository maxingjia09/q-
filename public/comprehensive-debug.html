<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>综合调试页面</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
        }
        .debug-section {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: #f9f9f9;
        }
        .file-test {
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .status-success {
            color: green;
            font-weight: bold;
        }
        .status-error {
            color: red;
            font-weight: bold;
        }
        img {
            max-width: 200px;
            max-height: 200px;
            border: 2px solid blue;
            margin-top: 10px;
        }
        button {
            margin-top: 10px;
            padding: 8px 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        pre {
            background-color: #f0f0f0;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
        #network-log {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #ddd;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>网站资源综合调试页面</h1>
    
    <div class="debug-section">
        <h2>基本信息</h2>
        <p>当前URL: <span id="current-url"></span></p>
        <p>时间戳: <span id="timestamp"></span></p>
    </div>
    
    <div class="debug-section">
        <h2>图片资源测试</h2>
        
        <div class="file-test">
            <h3>测试 favicon.ico</h3>
            <p>文件路径: /favicon.ico</p>
            <div id="favicon-status">测试中...</div>
            <img 
                id="favicon-test" 
                src="/favicon.ico" 
                alt="测试图标" 
                style="display: none;"
                onload="onResourceLoad('favicon')"
                onerror="onResourceError('favicon')"
            />
        </div>
        
        <div class="file-test">
            <h3>测试 mount-everest.jpg</h3>
            <p>文件路径: /mount-everest.jpg</p>
            <div id="image-status">测试中...</div>
            <img 
                id="image-test" 
                src="/mount-everest.jpg" 
                alt="测试图片" 
                style="display: none;"
                onload="onResourceLoad('image')"
                onerror="onResourceError('image')"
            />
        </div>
    </div>
    
    <div class="debug-section">
        <h2>文件存在性验证</h2>
        <button onclick="checkFileExistence('/favicon.ico')">检查 favicon.ico</button>
        <button onclick="checkFileExistence('/mount-everest.jpg')">检查 mount-everest.jpg</button>
        <div id="file-check-result"></div>
    </div>
    
    <div class="debug-section">
        <h2>网络请求日志</h2>
        <div id="network-log"></div>
    </div>
    
    <script>
        // 显示基本信息
        document.getElementById('current-url').textContent = window.location.href;
        document.getElementById('timestamp').textContent = new Date().toLocaleString();
        
        // 资源加载状态处理函数
        function onResourceLoad(type) {
            const statusElement = type === 'favicon' ? 'favicon-status' : 'image-status';
            const imageElement = type === 'favicon' ? 'favicon-test' : 'image-test';
            
            document.getElementById(statusElement).textContent = '资源加载成功！';
            document.getElementById(statusElement).className = 'status-success';
            document.getElementById(imageElement).style.display = 'block';
            
            logNetwork(`${type.toUpperCase()} 资源加载成功: ${document.getElementById(imageElement).src}`);
        }
        
        function onResourceError(type) {
            const statusElement = type === 'favicon' ? 'favicon-status' : 'image-status';
            
            document.getElementById(statusElement).textContent = '资源加载失败！';
            document.getElementById(statusElement).className = 'status-error';
            
            logNetwork(`${type.toUpperCase()} 资源加载失败`);
        }
        
        // 文件存在性检查
        function checkFileExistence(url) {
            const resultElement = document.getElementById('file-check-result');
            resultElement.textContent = `正在检查 ${url}...`;
            
            fetch(url, {
                method: 'HEAD'
            })
            .then(response => {
                if (response.ok) {
                    resultElement.innerHTML = `<span class="status-success">文件 ${url} 存在，状态码: ${response.status}</span>`;
                    logNetwork(`HEAD 请求 ${url} 成功，状态码: ${response.status}`);
                } else {
                    resultElement.innerHTML = `<span class="status-error">文件 ${url} 可能不存在，状态码: ${response.status}</span>`;
                    logNetwork(`HEAD 请求 ${url} 失败，状态码: ${response.status}`);
                }
            })
            .catch(error => {
                resultElement.innerHTML = `<span class="status-error">检查 ${url} 时出错: ${error.message}</span>`;
                logNetwork(`HEAD 请求 ${url} 异常: ${error.message}`);
            });
        }
        
        // 网络请求日志记录
        function logNetwork(message) {
            const logElement = document.getElementById('network-log');
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = document.createElement('div');
            logEntry.innerHTML = `<strong>[${timestamp}]</strong> ${message}`;
            logElement.appendChild(logEntry);
            logElement.scrollTop = logElement.scrollHeight;
        }
        
        // 开始测试图片加载
        logNetwork('开始图片资源测试...');
        setTimeout(() => {
            document.getElementById('favicon-test').src = '/favicon.ico';
            document.getElementById('image-test').src = '/mount-everest.jpg';
        }, 100);
    </script>
</body>
</html>
