<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试图片加载</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        .test-container {
            width: 100%;
            height: 500px;
            border: 2px solid blue;
            margin-bottom: 20px;
        }
        .direct-image {
            max-width: 100%;
            height: auto;
            border: 2px solid green;
        }
    </style>
</head>
<body>
    <h1>图片加载测试</h1>
    
    <h2>使用背景图片：</h2>
    <div class="test-container" style="background-image: url('mount-everest.jpg'); background-size: cover; background-position: center;">
        背景图片测试
    </div>
    
    <h2>直接使用img标签：</h2>
    <img src="mount-everest.jpg" alt="珠穆朗玛峰" class="direct-image">
</body>
</html>
