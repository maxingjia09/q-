<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片调试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .debug-info {
            background: #f0f0f0;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 5px;
        }
        img {
            max-width: 100%;
            height: auto;
            border: 2px solid blue;
        }
    </style>
</head>
<body>
    <h1>图片调试页面</h1>
    
    <div class="debug-info">
        <h2>调试信息</h2>
        <p>当前URL: <span id="current-url"></span></p>
        <p>图片URL: <a href="/mount-everest.jpg" target="_blank">/mount-everest.jpg</a></p>
    </div>
    
    <h2>直接显示图片:</h2>
    <img src="/mount-everest.jpg" alt="珠穆朗玛峰" id="test-image" onload="imageLoaded()" onerror="imageError()">
    
    <div id="status" style="margin-top: 20px;">图片加载状态: 等待加载...</div>
    
    <script>
        // 显示当前URL
        document.getElementById('current-url').textContent = window.location.href;
        
        // 图片加载成功
        function imageLoaded() {
            const status = document.getElementById('status');
            status.textContent = '图片加载成功!';
            status.style.color = 'green';
            console.log('图片加载成功');
        }
        
        // 图片加载失败
        function imageError() {
            const status = document.getElementById('status');
            status.textContent = '图片加载失败!';
            status.style.color = 'red';
            console.error('图片加载失败');
            
            // 尝试不同的路径
            const img = document.getElementById('test-image');
            img.src = 'mount-everest.jpg';
            console.log('尝试使用相对路径: mount-everest.jpg');
        }
    </script>
</body>
</html>
