<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f1c40f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f39c12;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景圆 -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGradient)" />
  
  <!-- 盾牌 -->
  <path d="M70 100 L100 60 L130 100 L130 140 L70 140 Z" fill="url(#shieldGradient)" stroke="#d35400" stroke-width="3" />
  
  <!-- 盾牌上的山峰图案 -->
  <path d="M85 105 L100 90 L115 105 L110 125 L90 125 Z" fill="#2c3e50" />
  
  <!-- 火焰元素 -->
  <path d="M100 75 Q95 70 90 75" stroke="#e74c3c" stroke-width="3" stroke-linecap="round" fill="none" />
  <path d="M100 75 Q105 70 110 75" stroke="#e74c3c" stroke-width="3" stroke-linecap="round" fill="none" />
  <path d="M100 75 Q100 65 100 75" stroke="#e74c3c" stroke-width="3" stroke-linecap="round" fill="none" />
  
  <!-- 文字 -->
  <text x="100" y="175" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">勇者户外团队</text>
</svg>