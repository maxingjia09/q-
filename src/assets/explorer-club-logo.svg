<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#27ae60;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#229954;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="compassGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#f39c12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e67e22;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- 背景圆 -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGradient)" />
  
  <!-- 指南针 -->
  <circle cx="100" cy="100" r="50" fill="#34495e" stroke="#2c3e50" stroke-width="3" />
  <circle cx="100" cy="100" r="10" fill="url(#compassGradient)" />
  
  <!-- 指南针指针 -->
  <path d="M100 50 L100 150" stroke="#e74c3c" stroke-width="4" stroke-linecap="round" />
  <path d="M50 100 L150 100" stroke="#3498db" stroke-width="4" stroke-linecap="round" />
  
  <!-- 探险装备：背包 -->
  <path d="M75 120 L125 120 L120 150 L80 150 Z" fill="#2c3e50" />
  <path d="M85 120 L115 120 L110 140 L90 140 Z" fill="#34495e" />
  <rect x="95" y="110" width="10" height="10" fill="#e74c3c" />
  
  <!-- 文字 -->
  <text x="100" y="175" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">探索者户外联盟</text>
</svg>